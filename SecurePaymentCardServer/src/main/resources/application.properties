spring.application.name=SimpleSecurePaymentCardServer
spring.config.import=optional:file:.env[.properties]

super.admin.email=${SUPER_ADMIN_EMAIL}
super.admin.password=${SUPER_ADMIN_PASSWORD}
super.admin.full-name=${SUPER_ADMIN_FULL_NAME}

####### JWT configurations ######
security.jwt.secret-key=${JWT_KEY}
security.jwt.expiration-time=3600000

####### MySQL configurations ######
spring.jpa.show-sql=true
spring.datasource.url=${DB_URL}
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect